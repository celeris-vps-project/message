<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Password Reset</title>
</head>
<body style="font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f5f5f5;">
<div style="max-width: 600px; margin: 0 auto; background-color: #ffffff; padding: 30px; border-radius: 8px;">
    <h2 style="color: #333;">Password Reset</h2>
    <p>Dear <span th:text="${username}">User</span>,</p>
    <p>We received a request to reset your password. Click the link below to proceed:</p>
    <div style="text-align: center; margin: 30px 0;">
        <a th:href="${resetLink}" style="background-color: #007bff; color: #ffffff; padding: 12px 30px; text-decoration: none; border-radius: 4px; display: inline-block;">
            Reset Password
        </a>
    </div>
    <p>This link will expire in <span th:text="${expireMinutes}">30</span> minutes.</p>
    <p>If you did not request this, please ignore this email.</p>
    <hr style="border: none; border-top: 1px solid #eee; margin: 20px 0;"/>
    <p style="color: #999; font-size: 12px;">This is an automated message from Celeris.</p>
</div>
</body>
</html>
